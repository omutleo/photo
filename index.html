<!-- index.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>База поставщиков HTec</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app-screen" class="hidden">
        <header class="main-header">
            <div class="header-content">
                <div class="brand">
                    <span class="logo-h">H</span><span class="logo-tec">Tec</span>
                </div>
                <div class="search-container">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" class="search-input" id="global-search" placeholder="Поиск поставщика, оборудования, контактов...">
                </div>
                <button class="btn btn-secondary" id="logout-btn">
                    <i class="fas fa-sign-out-alt"></i> Выход
                </button>
            </div>
        </header>

        <main class="container">
            <!-- DASHBOARD -->
            <div id="dashboard-view">
                <h1 class="page-title">База поставщиков</h1>
                <div class="stats-bar">
                    <div class="stat-item">
                        <span class="stat-number" id="total-suppliers">0</span>
                        <span class="stat-label">Всего поставщиков</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number" id="total-categories">0</span>
                        <span class="stat-label">Категорий</span>
                    </div>
                </div>
                <h2 class="section-title">Категории оборудования</h2>
                <div class="categories-grid" id="categories-container"></div>
            </div>

            <!-- CATEGORY VIEW -->
            <div id="category-view" class="hidden">
                <div class="category-header">
                    <button class="btn-back" id="back-to-dashboard">
                        <i class="fas fa-arrow-left"></i>
                    </button>
                    <div>
                        <h2 class="category-title-large" id="current-category-title">Название категории</h2>
                        <p class="category-count" id="current-category-count">0 поставщиков</p>
                    </div>
                </div>
                <div class="suppliers-list" id="suppliers-container"></div>
            </div>
        </main>

        <footer class="main-footer">
            <p>&copy; 2024 HTec. Все права защищены.</p>
        </footer>
    </div>

    <!-- Login modal for index.html if accessed directly -->
    <div id="login-modal" class="login-modal hidden">
        <div class="login-card">
            <span class="login-logo">
                <span class="logo-h">H</span><span class="logo-tec">Tec</span>
            </span>
            <h2 class="login-title">Вход в систему</h2>
            <form id="login-form-modal">
                <div class="form-group">
                    <label for="username-modal">Логин</label>
                    <input type="text" id="username-modal" placeholder="admin" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password-modal">Пароль</label>
                    <input type="password" id="password-modal" placeholder="20hyptec26" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary btn-full">Войти</button>
            </form>
            <p id="login-error-modal" class="error-message">Неверный логин или пароль</p>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
