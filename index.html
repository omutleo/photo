<!DOCTYPE html>
<html lang="ru">

    <title>База поставщиков HTec</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

            <nav class="categories-nav">

                <a href="#" class="category-btn">Сантехника</a>

            </nav>
        </main>

        <footer class="footer">
            <p>&copy; 2024 HTec. Все права защищены.</p>
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>

</html>
